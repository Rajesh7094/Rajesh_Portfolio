<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rajesh Kathirvel - Portfolio{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/static/style.css">
    {% block styles %}{% endblock %}
</head>
<body>
    <!-- Premium Backdrop Lights (Glowing Orbs for Background depth) -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <!-- Sticky Navigation Bar -->
    <header class="main-nav">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="gradient-text">Rajesh Kathirvel</span>
            </a>
            <button class="mobile-toggle" aria-label="Toggle navigation" onclick="toggleMobileMenu()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <nav class="nav-menu" id="navMenu">
                <a href="/" class="nav-link" id="nav-home"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/projects" class="nav-link" id="nav-projects"><i class="fa-solid fa-code-branch"></i> Projects</a>
                <a href="/certificates" class="nav-link" id="nav-certificates"><i class="fa-solid fa-award"></i> Certificates</a>
                <a href="/resume" class="nav-link" id="nav-resume"><i class="fa-solid fa-file-pdf"></i> Resume</a>
                <a href="/contact" class="nav-link" id="nav-contact"><i class="fa-solid fa-envelope"></i> Contact</a>
            </nav>
        </div>
    </header>

    <!-- Content Container -->
    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Professional Footer -->
    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-branding">
                <h3>Rajesh Kathirvel</h3>
                <p>B.Tech Artificial Intelligence and Data Science Graduate</p>
            </div>
            <div class="footer-socials">
                <a href="http://www.linkedin.com/in/rajesh-kathirvel-1a17082b3" target="_blank" rel="noopener noreferrer" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://github.com/Rajesh7094" target="_blank" rel="noopener noreferrer" title="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="mailto:rajesherode2004@gmail.com" title="Email"><i class="fa-solid fa-envelope"></i></a>
            </div>
            <div class="footer-copyright">
                <p>&copy; 2026 Rajesh Kathirvel. Designed with visual excellence.</p>
            </div>
        </div>
    </footer>

    <!-- Active Link Highlight & Navigation Scripts -->
    <script>
        // Set Active Navbar Links based on path
        document.addEventListener("DOMContentLoaded", () => {
            const currentPath = window.location.pathname;
            const homeLink = document.getElementById("nav-home");
            const projectsLink = document.getElementById("nav-projects");
            const certificatesLink = document.getElementById("nav-certificates");
            const resumeLink = document.getElementById("nav-resume");
            const contactLink = document.getElementById("nav-contact");

            // Remove all active classes
            [homeLink, projectsLink, certificatesLink, resumeLink, contactLink].forEach(el => {
                if (el) el.classList.remove("active");
            });

            if (currentPath === "/") {
                homeLink.classList.add("active");
            } else if (currentPath.startsWith("/projects")) {
                projectsLink.classList.add("active");
            } else if (currentPath.startsWith("/certificates")) {
                certificatesLink.classList.add("active");
            } else if (currentPath.startsWith("/resume")) {
                resumeLink.classList.add("active");
            } else if (currentPath.startsWith("/contact")) {
                contactLink.classList.add("active");
            }
        });

        // Mobile Menu Toggler
        function toggleMobileMenu() {
            const menu = document.getElementById("navMenu");
            const toggleIcon = document.querySelector(".mobile-toggle i");
            menu.classList.toggle("open");
            if (menu.classList.contains("open")) {
                toggleIcon.classList.remove("fa-bars");
                toggleIcon.classList.add("fa-xmark");
            } else {
                toggleIcon.classList.remove("fa-xmark");
                toggleIcon.classList.add("fa-bars");
            }
        }
    </script>
</body>
</html>
